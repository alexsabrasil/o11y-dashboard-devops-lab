name: CI Validate

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  validate-html-css:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Verificar arquivos obrigatórios
        run: |
          test -f index.html
          test -f style.css

      - name: Validar estrutura básica do HTML
        run: |
          grep -q "<!DOCTYPE html>" index.html
          grep -q "<html" index.html
          grep -q "</html>" index.html
          grep -q "style.css" index.html

      - name: Validar estrutura básica do CSS
        run: |
          grep -q "body" style.css
          grep -q "background-color" style.css

      - name: Resultado da validação
        run: echo "Validação concluída com sucesso."
